<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Lansa verification code</title>
  </head>
  <body style="margin:0;padding:0;background-color:#FDF8F2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;color:#191F71;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FDF8F2;padding:48px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;background:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 4px 24px rgba(25,31,113,0.06);">
            <tr>
              <td style="background:linear-gradient(135deg,#F58254 0%,#F26C3A 100%);padding:32px 40px;">
                <div style="font-family:'Urbanist',-apple-system,BlinkMacSystemFont,sans-serif;font-weight:900;font-size:28px;color:#ffffff;letter-spacing:-0.02em;">Lansa</div>
              </td>
            </tr>
            <tr>
              <td style="padding:48px 40px 16px 40px;">
                <h1 style="margin:0 0 16px 0;font-family:'Urbanist',-apple-system,sans-serif;font-weight:200;font-size:36px;line-height:1.15;letter-spacing:-0.03em;color:#191F71;">
                  Verify it's really you
                </h1>
                <p style="margin:0 0 24px 0;font-size:16px;line-height:1.6;color:#4B5563;">
                  Use the code below to confirm this action on your Lansa account. It expires in 5 minutes.
                </p>

                <div style="margin:0 0 32px 0;padding:24px;background:#FDF8F2;border-radius:16px;text-align:center;">
                  <div style="font-family:'SF Mono','Menlo','Consolas',monospace;font-weight:700;font-size:36px;letter-spacing:0.4em;color:#191F71;">
                    {{ .Token }}
                  </div>
                </div>

                <div style="height:1px;background:#F1E9DE;margin:0 0 24px 0;"></div>

                <p style="margin:0;font-size:13px;line-height:1.6;color:#9CA3AF;">
                  Didn't request this code? Someone may be trying to access your account — change your password immediately.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px 40px 40px 40px;background:#FDF8F2;">
                <p style="margin:0;font-size:12px;line-height:1.5;color:#9CA3AF;text-align:center;">
                  Lansa · Curaçao<br />
                  <a href="https://lansa.online" style="color:#191F71;text-decoration:none;">lansa.online</a>
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
